server:
  port: 8083

spring:
  application:
    name: ai-mock-interview-server
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mockinterview}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  security:
    jwt:
      secret: ${JWT_SECRET:8f7e6d5c4b3a2918273645546372819203948576abefcd}
      expiration-ms: 86400000 # 24 hours
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY:}
    assemblyai:
      api-key: ${ASSEMBLYAI_API_KEY:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
