# Local development profile.
# Uses an in-memory H2 database so the backend boots with zero external
# dependencies (no PostgreSQL required). Your production PostgreSQL config
# in application.yml is untouched; activate this with SPRING_PROFILES_ACTIVE=dev.
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mockinterview
    username: postgres
    password: password123
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true
    baseline-version: "1"
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
    show-sql: false

app:
  security:
    jwt:
      # DEV-ONLY throwaway Base64 secret (decodes to 36 bytes, satisfies HS256 + validator).
      # Override with the JWT_SECRET env var in ANY non-dev environment. NEVER use in production.
      secret: ${JWT_SECRET:YWIzZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXowMTIzNDU2Nzg5}
      # DEV-ONLY throwaway Base64 refresh secret. Override with JWT_REFRESH_SECRET env var.
      refresh-secret: ${JWT_REFRESH_SECRET:cmVmcmVzaFNlY3JldEtleUZvckxvY2FsRGV2T25seTIwMjREb05vdFVzZUluUHJvZA==}
