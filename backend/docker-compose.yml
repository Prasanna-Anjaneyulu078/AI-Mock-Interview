version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: mockinterview-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mockinterview
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: mockinterview-backend
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:password123}
      - DB_NAME=mockinterview
      # Secrets are injected from the host environment — never hardcoded here.
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY:}
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY:}
      - MURF_API_KEY=${MURF_API_KEY:}
      - JUDGE0_API_KEY=${JUDGE0_API_KEY:}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
