version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: mockinterview-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: mockinterview
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: mockinterview-backend
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password123
      - DB_NAME=mockinterview
      - JWT_SECRET=8f7e6d5c4b3a2918273645546372819203948576abefcd1234567890abcdef
      - GEMINI_API_KEY=${GEMINI_API_KEY:-your_gemini_api_key_here}
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY:-your_assemblyai_api_key_here}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
